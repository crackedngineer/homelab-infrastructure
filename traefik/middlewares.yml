http:
  middlewares:
    redirect-https:
      redirectScheme:
        scheme: https

    secure-headers:
      headers:
        sslRedirect: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true

    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    compress:
      compress: {}

    whitelist:
      ipWhiteList:
        sourceRange:
          - "192.168.0.0/16"
    
    authelia:
      forwardAuth:
        address: "http://192.168.31.12:9091/api/verify?rd=https://auth.homelab.local"
        trustForwardHeader: true
        authRequestHeaders:
          - X-Forwarded-Proto
          - X-Forwarded-Host
          - X-Forwarded-Uri
        authResponseHeaders:
          - Remote-User
          - Remote-Groups
          - Remote-Name
          - Remote-Email
