http:
  middlewares:
    redirect-https:
      redirectScheme:
        scheme: https

    secure-headers:
      headers:
        sslRedirect: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true

    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    compress:
      compress: {}

    whitelist:
      ipWhiteList:
        sourceRange:
          - "192.168.0.0/16"
