http:
  routers:
    traefik-dashboard-router:
      entryPoints:
        - websecure
      rule: Host(`traefik.homelab`)
      service: traefik-dashboard-svc
      tls: {}
      middlewares:
        - redirect-https
        - authelia

    proxmox-router:
      entryPoints:
        - websecure
      rule: Host(`proxmox.homelab`)
      service: proxmox-svc
      tls: {}
      middlewares:
        - redirect-https

    adguard-router:
      entryPoints:
        - websecure
      rule: Host(`adguard.homelab`)
      service: adguard-svc
      tls: {}
      middlewares:
        - secure-headers
        - rate-limit
        - compress
        - redirect-https
        - authelia

    authelia-router:
      entryPoints:
        - websecure
      rule: Host(`auth.authelia.homelab`)
      service: authelia-svc
      tls: {}
      middlewares:
        - secure-headers
        - rate-limit
        - compress
        - redirect-https

  services:
    traefik-dashboard-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.5:8080"

    proxmox-svc:
      loadBalancer:
        serversTransport: "pve"
        servers:
          - url: "https://192.168.31.249:8006"
    
    adguard-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.168:80"
    
    authelia-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.12:9091"

  serversTransports:
    pve:
      insecureSkipVerify: true
