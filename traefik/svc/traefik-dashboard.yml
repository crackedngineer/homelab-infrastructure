http:
  routers:
    traefik-dashboard-router:
      entryPoints:
        - websecure
      rule: Host(`traefik.homelab.local`) || (Host(`alpine-traefik.tailcda03.ts.net`) && PathPrefix(`/traefik`))
      service: traefik-dashboard-svc
      tls: {}
      middlewares:
        - redirect-https

  services:
    traefik-dashboard-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.5:8080"
