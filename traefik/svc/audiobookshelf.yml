http:
  routers:
    audiobookshelf-router:
      entryPoints:
        - websecure
      rule: Host(`audiobookshelf.homelab.local`)
      service: audiobookshelf-svc
      tls: {}
      middlewares:
        - redirect-https
        - secure-headers
        - rate-limit
        - compress

  services:
    audiobookshelf-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.54:13378"
