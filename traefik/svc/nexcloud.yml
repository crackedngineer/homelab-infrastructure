http:
  routers:
    nextcloud-router:
      entryPoints:
        - websecure
      rule: Host(`nextcloud.homelab.local`)
      service: nextcloud-svc
      tls: {}
      middlewares:
        - redirect-https
        - secure-headers
        - rate-limit
        - compress

  services:
    nextcloud-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.217:4443"
