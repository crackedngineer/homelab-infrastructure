http:
  routers:
    omni-tools-router:
      entryPoints:
        - websecure
      rule: Host(`omni-tools.homelab.local`)
      service: omni-tools-svc
      tls: {}
      middlewares:
        - redirect-https
        - secure-headers
        - rate-limit
        - compress

  services:
    omni-tools-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.171:8080"
