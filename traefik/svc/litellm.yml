http:
  routers:
    litellm-router:
      entryPoints:
        - web
      rule: Host(`litellm.homelab.local`)
      service: litellm-svc
      tls: {}
      # middlewares:
      # - redirect-https
      # - secure-headers
      # - rate-limit
      # - compress

  services:
    litellm-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.171:4100"
