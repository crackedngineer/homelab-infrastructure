http:
  routers:
    vaultwarden-router:
      entryPoints:
        - websecure
      rule: Host(`vaultwarden.homelab.local`)
      service: vaultwarden-svc
      tls: {}
      middlewares:
        - redirect-https
        - secure-headers
        - rate-limit
        - compress

  services:
    vaultwarden-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.206:8000"
