http:
  routers:
    jellyfin-router:
      entryPoints:
        - websecure
      rule: Host(`jellyfin.homelab.local`)
      service: jellyfin-svc
      tls: {}
      middlewares:
        - redirect-https
        - secure-headers
        - rate-limit
        - compress

  services:
    jellyfin-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.75:8096"
