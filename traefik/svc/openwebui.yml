http:
  routers:
    openwebui-router:
      entryPoints:
        - websecure
      rule: Host(`openwebui.homelab.local`)
      service: openwebui-svc
      tls: {}
      middlewares:
        - redirect-https
        # - secure-headers
        - rate-limit
        - compress

  services:
    openwebui-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.161:8080"
