http:
  routers:
    komodo-router:
      entryPoints:
        - websecure
      rule: Host(`komodo.homelab.local`)
      service: komodo-svc
      tls: {}
      middlewares:
        - redirect-https
        - secure-headers
        - rate-limit
        - compress

  services:
    komodo-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.171:9120"
