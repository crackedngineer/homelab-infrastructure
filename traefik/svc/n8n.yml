http:
  routers:
    n8n-router:
      entryPoints:
        - websecure
      rule: Host(`n8n.homelab.local`)
      service: n8n-svc
      tls: {}
      middlewares:
        - redirect-https
        - secure-headers
        - rate-limit
        - compress

  services:
    n8n-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.85:5678"
