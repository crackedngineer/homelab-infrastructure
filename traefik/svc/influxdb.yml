http:
  routers:
    influxdb-router:
      entryPoints:
        - websecure
      rule: Host(`influxdb.homelab.local`)
      service: influxdb-svc
      tls: {}
      middlewares:
        - redirect-https
        - secure-headers
        - rate-limit
        - compress

  services:
    influxdb-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.59:8086"
