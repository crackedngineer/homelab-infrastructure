http:
  routers:
    prometheus-router:
      entryPoints:
        - websecure
      rule: Host(`prometheus.homelab.local`)
      service: prometheus-svc
      tls: {}
      middlewares:
        - redirect-https
        - secure-headers
        - rate-limit
        - compress

  services:
    prometheus-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.74:9090"
