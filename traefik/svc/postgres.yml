http:
  routers:
    postgres-router:
      entryPoints:
        - websecure
      rule: Host(`postgres.homelab.local`)
      service: postgres-svc
      tls: {}
      middlewares:
        - redirect-https
        - secure-headers
        - rate-limit
        - compress

  services:
    postgres-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.72:5432"
