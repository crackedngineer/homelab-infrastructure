http:
  routers:
    homeassistant-router:
      entryPoints:
        - websecure
      rule: Host(`homeassistant.homelab.local`)
      service: homeassistant-svc
      tls: {}
      middlewares:
        - redirect-https
        - secure-headers
        - rate-limit
        - compress

  services:
    homeassistant-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.108:8123"
