http:
  routers:
    stirling-pdf-router:
      entryPoints:
        - websecure
      rule: Host(`stirling-pdf.homelab.local`)
      service: stirling-pdf-svc
      tls: {}
      middlewares:
        - redirect-https
        - secure-headers
        - rate-limit
        - compress

  services:
    stirling-pdf-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.131:8080"
