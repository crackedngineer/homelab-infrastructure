http:
  routers:
    kavita-router:
      entryPoints:
        - websecure
      rule: Host(`kavita.homelab.local`)
      service: kavita-svc
      tls: {}
      middlewares:
        - redirect-https
        - secure-headers
        - rate-limit
        - compress

  services:
    kavita-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.115:5000"
