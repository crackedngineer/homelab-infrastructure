http:
  routers:
    waha-router:
      entryPoints:
        - websecure
      rule: Host(`waha.homelab.local`)
      service: waha-svc
      tls: {}
      middlewares:
        - redirect-https
        - secure-headers
        - rate-limit
        - compress

  services:
    waha-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.171:4100"
