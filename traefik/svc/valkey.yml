http:
  routers:
    valkey-router:
      entryPoints:
        - websecure
      rule: Host(`valkey.homelab.local`)
      service: valkey-svc
      tls: {}
      middlewares:
        - redirect-https
        - secure-headers
        - rate-limit
        - compress

  services:
    valkey-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.94:6379"
