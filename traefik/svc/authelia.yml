http:
  routers:
    authelia-router:
      entryPoints:
        - websecure
      rule: Host(`auth.homelab.local`)
      service: authelia-svc
      tls: {}
      middlewares:
        - secure-headers
        - rate-limit
        - compress
        - redirect-https

  services:
    authelia-svc:
      loadBalancer:
        passHostHeader: true
        serversTransport: "pve"
        servers:
          - url: "https://192.168.31.12:9091"
