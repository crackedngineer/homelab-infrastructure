http:
  routers:
    grafana-router:
      entryPoints:
        - websecure
      rule: Host(`grafana.homelab.local`)
      service: grafana-svc
      tls: {}
      middlewares:
        - redirect-https
        - secure-headers
        - rate-limit
        - compress

  services:
    grafana-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.55:3000"
