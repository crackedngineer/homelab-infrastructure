http:
  routers:
    grafana-router:
      entryPoints:
        - websecure
      rule: Host(`grafana.homelab.local`) || (Host(`alpine-traefik.tailcda03.ts.net`) && PathPrefix(`/grafana`))
      service: grafana-svc
      tls: {}
      middlewares:
        - grafana-strip-prefix
        - redirect-https
        - secure-headers
        - rate-limit
        - compress
  
  # middlewares:
  #   grafana-strip-prefix:
  #     stripPrefix:
  #       prefixes:
  #         - "/grafana"

  services:
    grafana-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.55:3000"
