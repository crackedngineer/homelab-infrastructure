http:
  routers:
    navidrome-router:
      entryPoints:
        - websecure
      rule: Host(`navidrome.homelab.local`)
      service: navidrome-svc
      tls: {}
      middlewares:
        - redirect-https
        - secure-headers
        - rate-limit
        - compress

  services:
    navidrome-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.80:4533"
