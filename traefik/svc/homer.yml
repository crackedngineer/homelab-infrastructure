http:
  routers:
    homer-router:
      entryPoints:
        - websecure
      rule: Host(`homer.homelab.local`)
      service: homer-svc
      tls: {}
      middlewares:
        - redirect-https
        - secure-headers
        - rate-limit
        - compress

  services:
    homer-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.31.171:3000"
