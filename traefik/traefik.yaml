global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  filePath: /var/log/traefik/traefik.log

accessLog:
  filePath: /var/log/traefik/access.log

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
  traefik:
    address: ":8080"

api:
  insecure: true
  dashboard: true

ping: {}

providers:
  file:
    directory: /etc/traefik/services
    watch: true

tls:
  certificates:
    - certFile: /etc/traefik/certs/_wildcard.homelab.pem
      keyFile: /etc/traefik/certs/_wildcard.homelab-key.pem
