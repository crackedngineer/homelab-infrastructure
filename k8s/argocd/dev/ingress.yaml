apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myapp
  namespace: myapp
spec:
  defaultBackend:
      service:
        name: myapp-service
        port:
          number: 80
  ingressClassName: tailscale
  tls:
    - hosts:
        - myapp-svc
