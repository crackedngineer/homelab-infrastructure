apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myapp
  namespace: myapp
spec:
  defaultBackend:
      service:
        name: nginx
        port:
          number: 80
  ingressClassName: tailscale
  rules:
    - http:
        paths:
          - path: /abc
            pathType: Prefix
            backend:
              service:
                name: myapp-service
                port:
                  number: 80
